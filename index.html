<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sopa de Letras</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:     #fdf6ee;
  --blush:     #e8b4b8;
  --rose:      #c0616a;
  --deep:      #6b2737;
  --gold:      #c9a96e;

  /* pastel grid vars */
  --border:    #ddb8bc;
  --surface:   #fef0f1;
  --accent:    #c0616a;
  --accent-dim:#f7dde0;
  --text:      #7a3a42;
  --muted:     #b88a90;
  --found-bg:  #fce8ea;
  --found-color:#a03040;
  --sel-bg:    #f9d0d4;
  --sel-color: #8b2535;
}

html, body { height: 100%; }

body {
  min-height: 100vh;
  background-color: var(--cream);
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%,   #f3d5d8 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 10% 100%, #e8c6ca 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 90% 80%,  #f0dde0 0%, transparent 50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem;
  overflow-x: hidden;
  gap: 2rem;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

header {
  text-align: center;
  position: relative; z-index: 1;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: .85rem;
  letter-spacing: .3em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: .5rem;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  color: var(--deep);
  letter-spacing: -.01em;
  line-height: 1.15;
}

/* ornament */
.ornament {
  display: flex; align-items: center; gap: 1rem;
  width: 100%; max-width: 420px;
  position: relative; z-index: 1;
}
.ornament span { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.ornament svg  { flex-shrink: 0; color: var(--rose); }

/* grid wrapper */
.grid-wrap {
  position: relative; z-index: 1;
  border: 1.5px solid var(--blush);
  box-shadow:
    0 0 0 4px var(--accent-dim),
    0 8px 32px rgba(192,97,106,.12);
  padding: 6px;
  background: var(--surface);
  border-radius: 6px;
}
.grid-wrap::before, .grid-wrap::after {
  content: ''; position: absolute;
  width: 16px; height: 16px;
  border-color: var(--gold); border-style: solid;
}
.grid-wrap::before { top: -3px; left: -3px;  border-width: 2px 0 0 2px; }
.grid-wrap::after  { bottom: -3px; right: -3px; border-width: 0 2px 2px 0; }

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  border-top: 1px solid var(--border);
  border-left: 1px solid var(--border);
}

.cell {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  width: clamp(32px, 6vw, 54px);
  height: clamp(32px, 6vw, 54px);
  font-size: clamp(13px, 2.2vw, 21px);
  font-weight: 700;
  font-family: 'Playfair Display', serif;
  color: var(--text);
  cursor: pointer; user-select: none;
  transition: background .12s, color .12s;
}
.cell:hover   { background: #fce4e6; }
.cell.selected{ background: var(--sel-bg);   color: var(--sel-color); }
.cell.found   { background: var(--found-bg); color: var(--found-color); }

.controls {
  display: flex; gap: 1rem; flex-wrap: wrap;
  justify-content: center;
  position: relative; z-index: 1;
}

button {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem; letter-spacing: .08em;
  color: var(--rose); background: transparent;
  border: 1px solid var(--blush);
  padding: .45rem 1.4rem;
  border-radius: 2px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
button:hover { background: var(--accent-dim); border-color: var(--rose); }

.status {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem; letter-spacing: .06em;
  color: var(--muted);
  text-align: center;
  max-width: 480px;
  line-height: 1.6;
  position: relative; z-index: 1;
}
</style>
</head>
<body>

<header>
  <p class="subtitle">— juego —</p>
  <h1>A ver si no sos tan burra</h1>
</header>

<div class="ornament">
  <span></span>
  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/>
  </svg>
  <span></span>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="controls">
  <button onclick="clearSelection()">Limpiar selección</button>
  <button onclick="resetAll()">Reiniciar</button>
</div>

<p class="status" id="status">Para el amor de mi vida tini, te amo mucho mi bebita hermosa ♡</p>

<script>
const rows=[
  ['R','K','J','B','Z','C','R','K','F','A'],
  ['T','P','U','H','C','T','E','K','M','J'],
  ['L','Y','S','M','I','L','K','U','U','B'],
  ['T','R','N','K','W','U','H','P','C','V'],
  ['N','R','V','T','I','N','I','E','H','G'],
  ['I','A','Y','D','K','I','V','I','I','F'],
  ['T','H','I','A','G','O','T','I','T','A'],
  ['S','A','T','R','L','N','O','K','O','D'],
  ['U','T','O','Y','V','O','L','O','P','A'],
  ['J','R','A','S','D','E','I','M','E','S']
];

const grid=document.getElementById('grid');
let selected=new Set();

rows.forEach((row,r)=>{
  row.forEach((ch,c)=>{
    const d=document.createElement('div');
    d.className='cell';
    d.textContent=ch;
    d.id=`c${r}-${c}`;
    d.addEventListener('click',()=>toggle(d));
    grid.appendChild(d);
  });
});

function toggle(el){
  if(el.classList.contains('found'))return;
  el.classList.toggle('selected');
  if(el.classList.contains('selected'))selected.add(el.id);
  else selected.delete(el.id);
}
function clearSelection(){
  selected.forEach(id=>{
    const el=document.getElementById(id);
    if(el&&!el.classList.contains('found'))el.classList.remove('selected');
  });
  selected.clear();
}
function resetAll(){
  document.querySelectorAll('.cell').forEach(el=>el.classList.remove('selected','found'));
  selected.clear();
}
</script>
</body>
</html>
